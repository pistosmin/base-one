# ====================================================
# 프로덕션 환경 설정 (prod 프로필)
#
# 환경 변수로 민감한 접속 정보를 주입합니다.
# 소스 코드에 비밀번호, API 키 등을 절대 포함하지 마세요!
# ====================================================

spring:
  # DB 접속 정보: 환경 변수에서 주입
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Redis 접속 정보: 환경 변수에서 주입
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# 프로덕션 로깅 (불필요한 로그 제거)
logging:
  level:
    root: WARN
    com.community: INFO
    org.hibernate.SQL: WARN
