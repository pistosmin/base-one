# ====================================================
# 개발 환경 설정 (dev 프로필)
#
# Docker Compose로 기동한 로컬 인프라에 연결합니다.
# 디버그 로깅을 활성화하여 SQL 쿼리, 파라미터를 확인할 수 있습니다.
#
# 실행: ./gradlew bootRun --args='--spring.profiles.active=dev'
# 또는: make api
# ====================================================

spring:
  # PostgreSQL 데이터베이스 연결 (Docker Compose의 postgres 서비스)
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/community
    username: community
    password: community1234
    driver-class-name: org.postgresql.Driver

  # Redis 연결 (Docker Compose의 redis 서비스)
  data:
    redis:
      host: 127.0.0.1
      port: 6379

  # Flyway 마이그레이션 설정 (dev)
  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

  # JPA 추가 설정 (개발 전용)
  jpa:
    # 개발 중에는 create-drop 또는 update로 스키마 자동 관리할 수 있지만,
    # Flyway를 사용하므로 validate로 유지
    hibernate:
      ddl-auto: validate
    # SQL 로깅 활성화 (개발 중 쿼리 확인)
    show-sql: true

# 개발 환경 로깅 설정
logging:
  level:
    # Hibernate SQL 쿼리 로깅
    org.hibernate.SQL: DEBUG
    # Hibernate 바인딩 파라미터 로깅 (쿼리의 ? 자리에 들어가는 값 확인)
    org.hibernate.orm.jdbc.bind: TRACE
    # 애플리케이션 코드 디버그 로깅
    com.community: DEBUG
